[build]
  command = "npm run build"
  publish = ".svelte-kit/netlify"

[build.environment]
  NODE_VERSION = "22.12.0"

# Sharp binary dependency for image processing
[functions]
  external_node_modules = ["sharp"]
  included_files = ["fonts/**"]

# Edge function to rewrite og tags dynamically
[[edge_functions]]
  path = "/*"
  function = "rewrite-og-tags"

# Redirects for single page app - only apply to GET requests
# POST requests to Netlify Forms are excluded to allow form capture
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Method = ["GET"]}

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    x-frame-options = "SAMEORIGIN"
    x-content-type-options = "nosniff"
    x-xss-protection = "1; mode=block"
    referrer-policy = "no-referrer-when-downgrade"

# Disable all caching for image processing API
[[headers]]
  for = "/api/image"
  [headers.values]
    cache-control = "no-cache, no-store, must-revalidate, max-age=0, private"
    cdn-cache-control = "no-cache, no-store, must-revalidate, max-age=0"
    pragma = "no-cache"
    expires = "0"

