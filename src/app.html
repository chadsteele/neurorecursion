<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<meta name="text-scale" content="scale" />
	<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
	<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
	<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
	<link rel="icon" href="/favicon.ico">
	<link rel="manifest" href="/site.webmanifest">
	<title>Neuro Recursion Institute</title>

	<!-- Meta Description -->
	<meta name="description"
		content="Join our clinical research study on neurological symptom modulation through targeted neuroplasticity. Non-invasive, evidence-based treatment with often profound results in a single session.">

	<!-- Open Graph Tags -->
	<meta property="og:title" content="Neuro Recursion Institute - Clinical Research">
	<meta property="og:description"
		content="Join our clinical research on neurological symptom modulation through targeted neuroplasticity. Non-invasive, evidence-based treatment with often profound results in a single session.">
	<meta property="og:type" content="website">
	<meta property="og:url" content="https://neurorecursion.com">
	<meta property="og:image" content="https://neurorecursion.com/logo.png">
	<meta property="og:site_name" content="Neuro Recursion Institute">

	<!-- Twitter Card Tags -->
	<meta name="twitter:card" content="summary_large_image">
	<meta name="twitter:title" content="Neuro Recursion Institute - Clinical Research">
	<meta name="twitter:description"
		content="Join our clinical research study on neurological symptom modulation through targeted neuroplasticity. Non-invasive, evidence-based treatment with often profound results in a single session.">
	<meta name="twitter:image" content="https://neurorecursion.com/logo.png">

	%sveltekit.head%
</head>

<body data-sveltekit-preload-data="hover">
	<div style="display: contents">%sveltekit.body%</div>
</body>

</html>
